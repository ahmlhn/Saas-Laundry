ka Express 2 pcs</tspan></text><rect x="18" y="250" width="324" height="176" rx="24" fill="#ffffff" stroke="#d8e6f3" stroke-width="1" opacity="1" /><text x="34" y="278" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:13px"><tspan x="34" dy="0">Promo &amp; penyesuaian</tspan></text><text x="34" y="300" text-anchor="start" fill="#385f80" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="34" dy="0">Kode voucher</tspan></text><rect x="34" y="308" width="288" height="42" rx="15" fill="#f5fbff" stroke="#bfd8ec" stroke-width="1" opacity="1" /><text x="48" y="338" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-r" style="font-size:13px"><tspan x="48" dy="0">PROMO2K</tspan></text><text x="34" y="358" text-anchor="start" fill="#385f80" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="34" dy="0">Ongkir</tspan></text><rect x="34" y="366" width="136" height="42" rx="15" fill="#f5fbff" stroke="#bfd8ec" stroke-width="1" opacity="1" /><text x="48" y="396" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-r" style="font-size:13px"><tspan x="48" dy="0">20000</tspan></text><text x="186" y="358" text-anchor="start" fill="#385f80" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="186" dy="0">Diskon manual</tspan></text><rect x="186" y="366" width="136" height="42" rx="15" fill="#f5fbff" stroke="#bfd8ec" stroke-width="1" opacity="1" /><text x="200" y="396" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-r" style="font-size:13px"><tspan x="200" dy="0">0</tspan></text><rect x="18" y="440" width="324" height="214" rx="24" fill="url(#g-dark-panel)" stroke="none" stroke-width="0" opacity="1" /><text x="34" y="468" text-anchor="start" fill="rgba(255,255,255,0.76)" opacity="1" letter-spacing="0" class="f-sb" style="font-size:12px"><tspan x="34" dy="0">Ringkasan review</tspan></text><text x=
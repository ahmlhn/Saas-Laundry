  <rect x="18" y="18" width="324" height="226" rx="30" fill="url(#g-outlet)" stroke="none" stroke-width="0" opacity="1" /><text x="34" y="56" text-anchor="start" fill="#ffffff" opacity="1" letter-spacing="0" class="f-b" style="font-size:27px"><tspan x="34" dy="0">Cuci</tspan></text><text x="34" y="74" text-anchor="start" fill="rgba(255,255,255,0.86)" opacity="1" letter-spacing="1" class="f-sb" style="font-size:12px"><tspan x="34" dy="0">PILIH OUTLET AKTIF</tspan></text><text x="34" y="116" text-anchor="start" fill="rgba(255,255,255,0.86)" opacity="1" letter-spacing="0" class="f-r" style="font-size:13px"><tspan x="34" dy="0">Outlet aktif menentukan konteks transaksi, status</tspan><tspan x="34" dy="19">layanan, dan quick action selama sesi berjalan.</tspan></text><rect x="34" y="184" width="80" height="30" rx="15" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.18)" stroke-width="1" opacity="1" /><text x="74" y="203" text-anchor="middle" fill="#ffffff" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="74" dy="0">Plan PRO</tspan></text><rect x="122" y="184" width="72" height="30" rx="15" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.18)" stroke-width="1" opacity="1" /><text x="158" y="203" text-anchor="middle" fill="#ffffff" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="158" dy="0">3 outlet</tspan></text><rect x="18" y="258" width="324" height="132" rx="24" fill="#ffffff" stroke="#d8e6f3" stroke-width="1" opacity="1" /><text x="36" y="288" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:18px"><tspan x="36" dy="0">Ahmad Fauzi</tspan></text><text x="36" y="306" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:12px"><tspan x="36" dy="0">Role: owner, admin, cashier</tspan></text><rect x="230" y="274" width="94" height="30" rx="15" fill="#edf9f1" stroke="#bfe7cf" stroke-width="1" opacity="1" /><text x="277" y="293" text-anchor="middle" fill="#1f9e63" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="277" dy="0">Order aktif</tspan></text><text x="36" y="338" text-anchor="start" fill="#385f80" opacity="1" letter-spacing="0" class="f-sb" style="font-size:12px"><tspan x="36" dy="0">214/5000 order bulan ini</tspan></text><rect x="36" y="352" width="288" height="10" rx="999" fill="#edf5fd" stroke="none" stroke-width="0" opacity="1" /><rect x="36" y="352" width="92" height="10" rx="999" fill="#0ea4ce" stroke="none" stroke-width="0" opacity="1" /><text x="18" y="424" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:13px"><tspan x="18" dy="0">Pilih outlet kerja</tspan></text><text x="18" y="440" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:11px"><tspan x="18" dy="0">Tap satu outlet untuk masuk ke dashboard operasional.</tspan></text><rect x="18" y="470" width="324" height="116" rx="22" fill="#ffffff" stroke="#8bd1f2" stroke-width="1" opacity="1" /><text x="34" y="500" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:15px"><tspan x="34" dy="0">BL-01 - Laundry Poin Dago</tspan></text><rect x="264" y="486" width="60" height="30" rx="15" fill="#edf9f1" stroke="#bfe7cf" stroke-width="1" opacity="1" /><text x="294" y="505" text-anchor="middle" fill="#1f9e63" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="294" dy="0">Aktif</tspan></text><text x="34" y="522" text-anchor="start" fill="#385f80" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="34" dy="0">Timezone: Asia/Jakarta</tspan></text><text x="34" y="544" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:12px"><tspan x="34" dy="0">Outlet ini sedang digunakan untuk seluruh transaksi Anda.</tspan></text><rect x="18" y="598" width="324" height="116" rx="22" fill="#ffffff" stroke="#d8e6f3" stroke-width="1" opacity="1" /><text x="34" y="628" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:15px"><tspan x="34" dy="0">BL-02 - Laundry Poin Setiabudi</tspan></text><rect x="264" y="614" width="60" height="30" rx="15" fill="#f7fbff" stroke="#d8e6f3" stroke-width="1" opacity="1" /><text x="294" y="633" text-anchor="middle" fill="#385f80" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="294" dy="0">Pilih</tspan></text><text x="34" y="650" text-anchor="start" fill="#385f80" opacity="1" letter-spacing="0" class="f-sb" style="font-size:11px"><tspan x="34" dy="0">Timezone: Asia/Jakarta</tspan></text><text x="34" y="672" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:12px"><tspan x="34" dy="0">Tap untuk memilih outlet ini sebagai konteks kerja.</tspan></text><rect x="18" y="734" width="324" height="48" rx="16" fill="#ffffff" stroke="#d8e6f3" stroke-width="1" opacity="1" /><text x="180" y="763" text-anchor="middle" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:13px"><tspan x="180" dy="0">Logout Akun</tspan></text>

    <linearGradient id="g-login" x1="18" y1="18" x2="342" y2="266" gradientUnits="userSpaceOnUse"><stop stop-color="#0e8ee0"/><stop offset="0.55" stop-color="#0b6fca"/><stop offset="1" stop-color="#0a4fa8"/></linearGradient><linearGradient id="g-outlet" x1="18" y1="18" x2="342" y2="244" gradientUnits="userSpaceOnUse"><stop stop-color="#1f86e4"/><stop offset="0.55" stop-color="#136fd0"/><stop offset="1" stop-color="#0b4ba7"/></linearGradient><linearGradient id="g-home" x1="18" y1="18" x2="342" y2="214" gradientUnits="userSpaceOnUse"><stop stop-color="#0c7ad4"/><stop offset="0.55" stop-color="#0ea4ce"/><stop offset="1" stop-color="#1cd3e2"/></linearGradient><linearGradient id="g-command" x1="18" y1="18" x2="342" y2="228" gradientUnits="userSpaceOnUse"><stop stop-color="#0d6fc7"/><stop offset="0.55" stop-color="#0ea4ce"/><stop offset="1" stop-color="#1cd3e2"/></linearGradient><linearGradient id="g-urgent" x1="18" y1="18" x2="342" y2="228" gradientUnits="userSpaceOnUse"><stop stop-color="#7d2131"/><stop offset="0.55" stop-color="#c93d4f"/><stop offset="1" stop-color="#f18b3a"/></linearGradient><linearGradient id="g-role" x1="18" y1="18" x2="342" y2="228" gradientUnits="userSpaceOnUse"><stop stop-color="#10395f"/><stop offset="0.55" stop-color="#136aa0"/><stop offset="1" stop-color="#1cd3e2"/></linearGradient><linearGradient id="g-dark-panel" x1="18" y1="520" x2="342" y2="760" gradientUnits="userSpaceOnUse"><stop stop-color="#0d365f"/><stop offset="1" stop-color="#113a66"/></linearGradient>

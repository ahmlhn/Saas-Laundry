<tspan x="310" dy="0">#3</tspan></text><rect x="18" y="476" width="324" height="176" rx="24" fill="#ffffff" stroke="#d8e6f3" stroke-width="1" opacity="1" /><text x="34" y="504" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:13px"><tspan x="34" dy="0">Timeline 2 jam ke depan</tspan></text><rect x="34" y="528" width="10" height="10" rx="5" fill="#ce3d52" stroke="none" stroke-width="0" opacity="1" /><text x="54" y="538" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:12px"><tspan x="54" dy="0">09:30 follow up pickup telat</tspan></text><text x="54" y="556" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:11px"><tspan x="54" dy="0">Kurir belum assigned</tspan></text><rect x="34" y="568" width="10" height="10" rx="5" fill="#dd8c10" stroke="none" stroke-width="0" opacity="1" /><text x="54" y="578" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:12px"><tspan x="54" dy="0">10:00 reminder pelunasan</tspan></text><text x="54" y="596" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:11px"><tspan x="54" dy="0">3 invoice due hari ini</tspan></text><rect x="34" y="608" width="10" height="10" rx="5" fill="#2a7ce2" stroke="none" stroke-width="0" opacity="1" /><text x="54" y="618" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:12px"><tspan x="54" dy="0">10:20 cek order siap antar</tspan></text><text x="54" y="636" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:11px"><tspan x="54" dy="0">2 alamat butuh verifikasi</tspan></text><rect x="18" y="666" width="140" height="50" rx="16" fill="#c93d4f" stroke="none" stroke-width="1" opacity="1" /><text x="88" y="696" text-anchor="middle" fill="#ffffff" opacity="1" letter-spacing="0" class="f-b" style="font-size:13px"><
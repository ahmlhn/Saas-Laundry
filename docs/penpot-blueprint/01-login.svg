180" dy="0">Masuk Sekarang</tspan></text><rect x="36" y="636" width="288" height="48" rx="16" fill="#eef8ff" stroke="#bfd8ec" stroke-width="1" opacity="1" /><text x="180" y="665" text-anchor="middle" fill="#2a7ce2" opacity="1" letter-spacing="0" class="f-b" style="font-size:13px"><tspan x="180" dy="0">Masuk dengan Biometrik</tspan></text><rect x="18" y="724" width="324" height="58" rx="20" fill="#f7fbff" stroke="#d8e6f3" stroke-width="1" opacity="1" /><rect x="34" y="739" width="28" height="28" rx="10" fill="#d9f8ff" stroke="none" stroke-width="0" opacity="1" /><text x="48" y="758" text-anchor="middle" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:12px"><tspan x="48" dy="0">i</tspan></text><text x="76" y="748" text-anchor="start" fill="#0a2b49" opacity="1" letter-spacing="0" class="f-b" style="font-size:11px"><tspan x="76" dy="0">Akses cepat untuk owner, admin, cashier, worker, dan courier</tspan></text><text x="76" y="764" text-anchor="start" fill="#6f8ba4" opacity="1" letter-spacing="0" class="f-r" style="font-size:10px"><tspan x="76" dy="0">Setelah login, aplikasi akan meminta outlet aktif.</tspan></text>
